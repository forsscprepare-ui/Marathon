<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon Files</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F3F1FB;
    color:white;
    min-height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color: #1e293b;
}

#fileList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.file-card{
    background:#1e293b;
    padding:18px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    border:1px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.file-card:hover{
    transform:translateY(-3px);
    background:#334155;
}

.file-name{
    font-size:18px;
    font-weight:bold;
    word-break:break-word;
}

.loading{
    text-align:center;
    font-size:18px;
    color: #1e293b;
}

.error{
    text-align:center;
    color:#ff6b6b;
}
</style>
</head>
<body>

<h1>Available Files</h1>
<div id="status" class="loading">Loading files...</div>
<div id="fileList"></div>

<script>
const USERNAME = "forsscprepare-ui";
const REPO = "Marathon";

const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents`;

async function loadFiles() {
    try {
        const response = await fetch(apiUrl);
        if(!response.ok) throw new Error("GitHub API Error");

        const files = await response.json();

        // Filter and get commit info for sorting
        const htmlFiles = files.filter(file => 
            file.type === "file" && 
            file.name.endsWith(".html") && 
            file.name.toLowerCase() !== "index.html"
        );

        // Fetch last commit date for each file for sorting
        const detailedFiles = await Promise.all(htmlFiles.map(async (file) => {
            const commitRes = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/commits?path=${file.name}&per_page=1`);
            const commits = await commitRes.json();
            return {
                ...file,
                date: commits[0]?.commit.committer.date || ""
            };
        }));

        // Sort: Recent first
        detailedFiles.sort((a, b) => new Date(b.date) - new Date(a.date));

        document.getElementById("status").style.display = "none";
        const container = document.getElementById("fileList");

        if(detailedFiles.length === 0){
            container.innerHTML = "<p>No HTML files found.</p>";
            return;
        }

        detailedFiles.forEach(file => {
            const card = document.createElement("div");
            card.className = "file-card";
            
            // Remove .html extension
            const displayName = file.name.replace(".html", "");

            card.innerHTML = `
                
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>

                <div class="file-name">${displayName}</div>
            `;

            card.onclick = () => {
                window.open(`https://${USERNAME}.github.io/${REPO}/${file.name}`, "_blank");
            };

            container.appendChild(card);
        });

    } catch(err) {
        document.getElementById("status").className = "error";
        document.getElementById("status").textContent = "Failed to load repository files.";
    }
}

loadFiles();
</script>

</body>
</html>
