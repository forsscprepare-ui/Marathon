<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon Files</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F3F1FB;
    color:white;
    min-height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

#fileList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.file-card{
    background:#1e293b;
    padding:18px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    border:1px solid #334155;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.file-card:hover{
    transform:translateY(-3px);
    background:#334155;
}

.file-name{
    font-size:18px;
    font-weight:bold;
    word-break:break-word;
}

.file-icon{
    font-size:22px;
    opacity:0.8;
    flex-shrink:0;
    margin-left:12px;
}

.loading{
    text-align:center;
    font-size:18px;
}

.error{
    text-align:center;
    color:#ff6b6b;
}
</style>
</head>
<body>

<div id="status" class="loading">Loading files...</div>
<div id="fileList"></div>

<script>
const USERNAME = "forsscprepare-ui";
const REPO = "Marathon";

const apiUrl =
`https://api.github.com/repos/${USERNAME}/${REPO}/contents`;

async function getLastModified(filePath) {
    try {
        const response = await fetch(
            `https://api.github.com/repos/${USERNAME}/${REPO}/commits?path=${filePath}&per_page=1`
        );

        const data = await response.json();

        if (data.length > 0) {
            return new Date(data[0].commit.committer.date).getTime();
        }

        return 0;
    } catch {
        return 0;
    }
}

async function loadFiles() {

    try {

        const response = await fetch(apiUrl);

        if(!response.ok){
            throw new Error("GitHub API Error");
        }

        const files = await response.json();

        let htmlFiles = files.filter(file =>
            file.type === "file" &&
            file.name.endsWith(".html") &&
            file.name.toLowerCase() !== "index.html"
        );

        // Get last modified date for each file
        htmlFiles = await Promise.all(
            htmlFiles.map(async file => ({
                ...file,
                lastModified: await getLastModified(file.path)
            }))
        );

        // Newest files first
        htmlFiles.sort((a,b) => b.lastModified - a.lastModified);

        document.getElementById("status").style.display = "none";

        const container = document.getElementById("fileList");

        if(htmlFiles.length === 0){
            container.innerHTML =
                "<p>No HTML files found.</p>";
            return;
        }

        htmlFiles.forEach(file => {

            const displayName =
                file.name.replace(/\.html$/i, "");

            const card = document.createElement("div");
            card.className = "file-card";

            card.innerHTML = `
                <div class="file-name">${displayName}</div>
                <div class="file-icon">⏱️</div>
            `;

            card.onclick = () => {

                const pageUrl =
                `https://${USERNAME}.github.io/${REPO}/${file.name}`;

                window.open(pageUrl, "_blank");
            };

            container.appendChild(card);
        });

    } catch(err) {

        document.getElementById("status").className = "error";
        document.getElementById("status").textContent =
        "Failed to load repository files.";
    }
}

loadFiles();
</script>

</body>
</html>
